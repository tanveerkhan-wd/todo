name: todo_offline
description: A fully offline cross-platform Todo app with local JSON persistence.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  share_plus: ^10.0.3
  file_picker: ^8.1.7
  collection: ^1.18.0
  flutter_local_notifications: ^17.2.1
  local_auth: ^2.3.0
  timezone: ^0.9.4
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
